version: "{build}"

max_jobs: 1

image: Ubuntu2204

build: off
test: off

environment:
  DOTNET_SKIP_FIRST_TIME_EXPERIENCE: "1"
  DOTNET_CLI_TELEMETRY_OPTOUT: "1"
  NUGET_XMLDOC_MODE: "skip"

install:
  - sh: |
      set -euo pipefail

      pip install "git+https://github.com/vitkuz573/abi-forge.git" --break-system-packages

      if ! dotnet --list-sdks | grep -q '^10\.'; then
        curl -fsSL https://dot.net/v1/dotnet-install.sh -o /tmp/dotnet-install.sh
        bash /tmp/dotnet-install.sh --channel 10.0 --install-dir "$HOME/.dotnet"
      fi

      export PATH="$HOME/.dotnet:$PATH"
      dotnet --info

      if ! command -v clang >/dev/null 2>&1; then
        sudo apt-get update
        sudo apt-get install -y clang
      fi
      clang --version
      python3 --version

build_script:
  - sh: |
      set -euo pipefail
      export PATH="$HOME/.dotnet:$PATH"
      mkdir -p artifacts/abi

      python3 -m unittest discover -s tests/abi -p "test_*.py"

      scripts/abi_guardrails.sh

      abi_framework check \
        --skip-binary \
        --output-dir artifacts/abi \
        --report-json artifacts/abi/codegen.report.json

      dotnet build src/LumenRTC/LumenRTC.csproj -v minimal

      abi_framework waiver-audit \
        --output artifacts/abi/waiver.audit.report.json \
        --fail-on-expired \
        --fail-on-missing-metadata

artifacts:
  - path: artifacts/abi/**
    name: abi-report
